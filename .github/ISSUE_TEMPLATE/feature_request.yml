name: Feature request
description: Propose a focused capability or design improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should ChronoStore address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the API, storage, CLI, or GUI behavior you expect.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or simpler approaches where relevant.

  - type: textarea
    id: compatibility
    attributes:
      label: Correctness and compatibility impact
      description: Note effects on durability, recovery, concurrency, file formats, or public APIs.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and the roadmap for this request.
          required: true
